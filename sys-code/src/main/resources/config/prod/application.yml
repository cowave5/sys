server:
  port: ${server_port:19030}
  servlet:
    context-path: /code

spring:
  application:
    name: sys-code
  access:
    always-success: true
  datasource:
    url: ${datasource_url:jdbc:postgresql://127.0.0.1:5432/sys-code}
    username: ${datasource_username:postgres}
    password: ${datasource_password:postgres}
  liquibase:
    enabled: true
    change-log: sql/changelog.yml
  cloud:
    nacos:
      discovery:
        server-addr: ${nacos_server:10.64.4.74:8848}
