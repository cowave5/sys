spring:
  messages:
    basename: META-INF/i18n/messages
  cloud:
    discovery:
      client:
        composite-indicator:
          enabled: false
    nacos:
      discovery:
        metadata:
          path: ${server.servlet.context-path}
          management:
            context-path: ${server.servlet.context-path}/actuator

logging:
  sql-enabled: false

mybatis-plus:
  global-config:
    banner: false

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: ALWAYS
  health:
    mail:
      enabled: false
    ldap:
      enabled: false
    ping:
      enabled: false
    diskSpace:
      enabled: false
