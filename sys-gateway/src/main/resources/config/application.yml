server:
  port: ${app_port:19000}
  servlet:
    context-path: /

spring:
  application:
    name: sys-gateway
  main:
    web-application-type: reactive
  redis:
    host: ${redis_host:127.0.0.1}
    port: ${redis_port:6379}
  access:
    auth:
      ignore-urls:
        - /admin/api/v1/oauth/client/authorize/token
        - /admin/api/v1/oauth/client/redirect/**
        - /admin/api/v1/auth/public/**
        - /admin/api/v1/flow/designer/**
        - /admin/designer/**
        - /admin/favicon.ico
        - /admin/actuator/**
        - /admin/doc/**
        - /code/favicon.ico
        - /code/actuator/**
        - /code/doc/**
        - /quartz/favicon.ico
        - /quartz/actuator/**
        - /quartz/doc/**
  cloud:
    discovery:
      client:
        composite-indicator:
          enabled: false
    nacos:
      discovery:
        server-addr: ${nacos_server:10.64.4.74:8848}
        metadata:
          context-path: ${server.servlet.context-path}
    gateway:
      enabled: true
      routes:
        - id: socket
          uri: lb:ws://sys-admin
          predicates:
            - Path=/socket.io/**
        - id: admin
          uri: lb://sys-admin
          predicates:
            - Path=/admin/**
        - id: quartz
          uri: lb://sys-quartz
          predicates:
            - Path=/quartz/**
        - id: flow
          uri: lb://sys-flow
          predicates:
            - Path=/flow/**
        - id: code
          uri: lb://sys-code
          predicates:
            - Path=/code/**

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: ALWAYS
  health:
    mail:
      enabled: false
    ping:
      enabled: false
    diskSpace:
      enabled: false
    gateway:
      enabled: true
